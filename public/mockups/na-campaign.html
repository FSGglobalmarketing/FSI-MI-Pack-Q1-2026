<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>North America Campaign Preview</title>
    <link rel="stylesheet" href="/mockups/na-campaign.css" />
  </head>
  <body>
    <main class="na-page">
      <header class="na-topbar">
        <img src="/mockups/igneo-footer-logo.svg" alt="Igneo logo" class="na-logo" />
        <nav class="na-nav" aria-label="Preview navigation">
          <a href="#">About</a>
          <a href="#">Contact</a>
          <a href="#">Insights</a>
        </nav>
      </header>

      <section class="na-hero" aria-label="Campaign hero">
        <img src="/mockups/front-cover-q4.jpg" alt="Campaign hero background" class="na-hero-image" />
        <div class="na-hero-overlay">
          <p class="na-kicker">Investing in North American Infrastructure</p>
          <h1>Middle market.<br />Maximum impact.</h1>
        </div>
      </section>

      <section class="na-content">
        <article class="na-card">
          <h2>Key message</h2>
          <p>
            We combine proactive asset management with deep regional knowledge to create resilient,
            long-term value.
          </p>
          <button type="button">Learn more</button>
        </article>

        <article class="na-card na-card-image">
          <img src="/mockups/rail-to-runway-us-backbone.jpg" alt="Rail infrastructure" />
        </article>
      </section>

      <section class="na-metrics" aria-label="Campaign metrics">
        <div class="na-metric">
          <span class="label">Impressions</span>
          <span class="value">1.2M</span>
        </div>
        <div class="na-metric">
          <span class="label">CTR</span>
          <span class="value">8.37%</span>
        </div>
        <div class="na-metric">
          <span class="label">Site visits</span>
          <span class="value">16,219</span>
        </div>
      </section>
    </main>
  </body>
</html>
